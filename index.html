<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獨立光圈外圍 - 隨機打亂路徑生成器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 950px;
            margin: 0 auto;
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #9b59b6;
            padding-bottom: 8px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .config-box {
            background: #fbf5fc;
            border-left: 4px solid #9b59b6;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 4px 4px 0;
        }
        .config-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        label {
            font-weight: bold;
        }
        input[type="number"], select {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .flex-grid {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        textarea {
            width: 100%;
            height: 280px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 12px;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.2s;
        }
        .btn-primary {
            background-color: #9b59b6;
            color: white;
        }
        .btn-primary:hover {
            background-color: #8e44ad;
        }
        .btn-success {
            background-color: #2ecc71;
            color: white;
        }
        .btn-success:hover {
            background-color: #27ae60;
        }
        .hint {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎲 獨立光圈外圍 - 隨機打亂路徑生成器</h2>
    <p>輸入花朵座標後，工具會計算光圈邊緣的行進點，並在輸出時<strong>自動將所有座標的順序隨機打亂</strong>。</p>
    
    <div class="config-box">
        <div class="config-group">
            <div>
                <label for="radiusDistance">光圈半徑 (公尺): </label>
                <input type="number" id="radiusDistance" value="12" step="1" min="1">
            </div>
            <div>
                <label for="outputMode">生成模式: </label>
                <select id="outputMode">
                    <option value="four">每個中心點生成 4 個點 (東、西、南、北) 並全部打亂</option>
                    <option value="north">只生成正北方點位並打亂</option>
                    <option value="south">只生成正南方點位並打亂</option>
                    <option value="east">只生成正東方點位並打亂</option>
                    <option value="west">只生成正西方點位並打亂</option>
                </select>
            </div>
        </div>
        <div class="hint">※ 每次點擊「生成」按鈕，打亂的順序都會隨機改變喔！</div>
    </div>

    <div class="flex-grid">
        <div class="col">
            <label for="inputCoords">原始花朵中心座標 (每行一組)</label>
            <textarea id="inputCoords" placeholder="26.862093,81.037686..."></textarea>
        </div>
        
        <div class="col">
            <label for="outputCoords">隨機打亂後的光圈外圍點 (人物觸發點)</label>
            <textarea id="outputCoords" readonly placeholder="打亂後的座標會顯示在這裡..."></textarea>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-primary" onclick="generateOrbitCoordinates()">🔮 生成並隨機打亂點位</button>
        <button class="btn-success" onclick="copyToClipboard()">📋 複製隨機座標</button>
    </div>
</div>

<script>
// 預設填入你的座標資料
document.getElementById('inputCoords').value = `26.862093,81.037686
26.863357,81.037418
26.864346,81.037161
26.863167,81.038422
26.865045,81.039120
26.865547,81.039940
26.863643,81.040191`;

// 費雪-耶茨隨機打亂演算法 (Fisher-Yates Shuffle)
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function generateOrbitCoordinates() {
    const inputText = document.getElementById('inputCoords').value.trim();
    if (!inputText) {
        alert('請先輸入座標！');
        return;
    }

    const lines = inputText.split('\n');
    const coords = [];
    
    for (let line of lines) {
        const parts = line.split(',');
        if (parts.length === 2) {
            const lat = parseFloat(parts[0].trim());
            const lng = parseFloat(parts[1].trim());
            if (!isNaN(lat) && !isNaN(lng)) {
                coords.push({ lat, lng });
            }
        }
    }

    if (coords.length === 0) {
        alert('找不到有效的座標格式！');
        return;
    }

    const radius = parseFloat(document.getElementById('radiusDistance').value) || 12;
    const mode = document.getElementById('outputMode').value;
    
    const latDegreePerMeter = 1 / 111000;
    const lngDegreePerMeter = 1 / 99000;

    const offsetLatVal = radius * latDegreePerMeter;
    const offsetLngVal = radius * lngDegreePerMeter;

    let rawResults = [];

    coords.forEach((c, index) => {
        const itemNum = index + 1;
        
        const north = `${(c.lat + offsetLatVal).toFixed(6)},${c.lng.toFixed(6)}`;
        const south = `${(c.lat - offsetLatVal).toFixed(6)},${c.lng.toFixed(6)}`;
        const east  = `${c.lat.toFixed(6)}, ${(c.lng + offsetLngVal).toFixed(6)}`;
        const west  = `${c.lat.toFixed(6)}, ${(c.lng - offsetLngVal).toFixed(6)}`;

        if (mode === 'four') {
            rawResults.push({ coord: north, note: `中心點 ${itemNum} 的 [北] 外圍` });
            rawResults.push({ coord: south, note: `中心點 ${itemNum} 的 [南] 外圍` });
            rawResults.push({ coord: east,  note: `中心點 ${itemNum} 的 [東] 外圍` });
            rawResults.push({ coord: west,  note: `中心點 ${itemNum} 的 [西] 外圍` });
        } else {
            let targetCoord = '';
            if (mode === 'north') targetCoord = north;
            if (mode === 'south') targetCoord = south;
            if (mode === 'east')  targetCoord = east;
            if (mode === 'west')  targetCoord = west;
            rawResults.push({ coord: targetCoord, note: `中心點 ${itemNum} 外圍` });
        }
    });

    // 核心改動：在這裡將產生的點位完全打亂順序
    const shuffledResults = shuffleArray(rawResults);

    // 組裝輸出文字（加上註解方便閱讀）
    const displayLines = shuffledResults.map(item => `${item.coord} // ${item.note}`);

    document.getElementById('outputCoords').value = displayLines.join('\n');
}

function copyToClipboard() {
    const outputText = document.getElementById('outputCoords');
    if (!outputText.value) {
        alert('請先點擊生成按鈕！');
        return;
    }
    
    // 複製時會自動拔掉後面的 // 註解，留下乾淨的打亂座標
    let cleanText = outputText.value.replace(/\/\/.*$/gm, '').replace(/^\s*[\r\n]/gm, '').trim();
    
    navigator.clipboard.writeText(cleanText).then(() => {
        alert('📋 隨機打亂的乾淨座標已成功複製到剪貼簿！');
    }).catch(err => {
        alert('複製失敗，請手動複製。');
    });
}
</script>

</body>
</html>
